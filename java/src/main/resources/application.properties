server.port=3000
spring.main.banner-mode=off
logging.level.org.springframework=WARN
logging.level.com.typeahead=INFO

# Postgres (optional, falls back to H2 in-memory if PG_URL not set).
# PG_URL with jdbc:postgresql prefix auto-selects the Postgres driver + dialect
# via TypeaheadApplication.datasourceConfig. Set both env vars together:
# PG_URL=jdbc:postgresql://host:5432/db
# PG_USER=... PG_PASSWORD=... (optional)
#  PG_DRIVER / PG_DIALECT override
# Without PG_URL: H2 in-memory + H2 dialect.
spring.datasource.url=${PG_URL:jdbc:h2:mem:typeahead;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.username=${PG_USER:sa}
spring.datasource.password=${PG_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Redis (optional, falls back to in-memory if REDIS_URL not set).
# Set REDIS_URL=redis://... to enable, otherwise activate the fallback profile.
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}
spring.data.redis.timeout=3000ms

# When REDIS_URL is empty, force the fallback profile so Lettuce auto-config
# does not try to connect. Set REDIS_URL to disable this.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:}
