<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Typeahead</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
<main class="page">
 <header class="hdr">
 <div class="hdr-left">
 <div class="brand">
 <span class="brand-mark"></span>
 <span class="brand-name">Typeahead</span>
 </div>
 <div class="brand-sub">prefix search · trending · cache-routed</div>
 </div>
 <div class="hdr-right">
 <span class="ranking-label">Ranking</span>
 <div class="ranking-toggle" role="tablist">
 <button id="mode-pop" class="ranking-btn active" data-mode="popularity" type="button">popularity</button>
 <button id="mode-rec" class="ranking-btn" data-mode="recency" type="button">recency</button>
 </div>
 </div>
 </header>

 <section class="search-wrap">
 <div class="search-field">
 <span class="search-icon" aria-hidden="true">
 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><line x1="16.5" y1="16.5" x2="21" y2="21"></line></svg>
 </span>
 <input id="q" type="text" autocomplete="off" spellcheck="false" placeholder="Search products, topics, code…" />
 <button id="submit" class="search-submit" type="button">
 <span class="submit-label">Search</span>
 <span class="submit-spinner" hidden></span>
 </button>
 </div>

 <div id="dropdown" class="dropdown" hidden></div>

 <div id="telemetry" class="telemetry" hidden></div>
 </section>

 <section id="success" class="result result-ok" hidden></section>
 <section id="error" class="result result-err" hidden></section>

 <section class="trending">
 <div class="section-head">
 <h2>Trending</h2>
 <span id="rank-note" class="section-note">by all-time search count</span>
 </div>
 <div id="trending-list" class="chips"></div>
 </section>

 <section id="recent-wrap" class="recent" hidden>
 <div class="section-head">
 <h2>Recent</h2>
 <button id="clear-recent" class="link-btn" type="button">clear</button>
 </div>
 <div id="recent-list" class="chips"></div>
 </section>

 <footer class="foot">
 suggestions debounced · results cached across 4 logical nodes via consistent hashing · counts updated through batched writes
 </footer>
</main>
<script src="/app.js" defer></script>
</body>
</html>
